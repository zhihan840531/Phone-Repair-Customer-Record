<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>手機維修客戶紀錄</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <style>
      :root { font-family: "Noto Sans TC", system-ui, sans-serif; }
      body { margin: 0; background: #f5f7fb; color: #1f2937; }
      .container { max-width: 1080px; margin: 0 auto; padding: 24px 16px 48px; }
      .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
      h1 { margin: 0 0 12px; font-size: 24px; }
      .toolbar, .grid { display: grid; gap: 10px; }
      .toolbar { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); align-items: end; }
      .grid { grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); }
      label { display: flex; flex-direction: column; gap: 6px; font-size: 13px; color: #4b5563; }
      input, select, button, textarea {
        border: 1px solid #d1d5db; border-radius: 8px; padding: 10px; font-size: 14px; background: #fff;
      }
      button { cursor: pointer; background: #2563eb; color: #fff; border-color: #2563eb; }
      button.secondary { background: #fff; color: #111827; }
      button:disabled { opacity: .6; cursor: not-allowed; }
      .actions { display: flex; gap: 8px; flex-wrap: wrap; }
      .status { font-size: 13px; color: #374151; margin-top: 8px; min-height: 20px; }
      table { width: 100%; border-collapse: collapse; font-size: 13px; }
      th, td { border-bottom: 1px solid #e5e7eb; padding: 8px; text-align: left; vertical-align: top; }
      th { background: #f9fafb; position: sticky; top: 0; }
      .table-wrap { max-height: 480px; overflow: auto; border: 1px solid #e5e7eb; border-radius: 8px; }
      .muted { color: #6b7280; font-size: 12px; }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1>手機維修客戶紀錄</h1>
        <div class="toolbar">
          <label>
            搜尋
            <input id="search" placeholder="姓名、電話、品牌、型號" />
          </label>
          <label>
            維修日期起
            <input id="fromDate" type="date" />
          </label>
          <label>
            維修日期迄
            <input id="toDate" type="date" />
          </label>
          <div class="actions">
            <button id="btnExport" type="button">匯出 Excel</button>
            <label class="secondary" style="justify-content:center; cursor:pointer; border:1px solid #d1d5db; border-radius:8px; padding:10px;">
              匯入 Excel
              <input id="importFile" type="file" accept=".xlsx,.xls" style="display:none" />
            </label>
            <button id="btnClear" class="secondary" type="button">清除篩選</button>
          </div>
        </div>
        <div class="status" id="status"></div>
        <p class="muted">匯入欄位可用：customer_name / phone / brand / model / repair_item / imei / status / repair_date / price / cost / notes。也支援中文欄名。</p>
      </section>

      <section class="card">
        <h2 style="margin-top:0">新增客戶維修資料</h2>
        <form id="formAdd">
          <div class="grid">
            <label>客戶姓名<input name="customer_name" required /></label>
            <label>電話<input name="phone" required /></label>
            <label>品牌<input name="brand" value="apple" /></label>
            <label>型號<input name="model" /></label>
            <label>維修項目<input name="repair_item" required /></label>
            <label>IMEI<input name="imei" /></label>
            <label>狀態<input name="status" value="received" /></label>
            <label>維修日期<input name="repair_date" type="date" required /></label>
            <label>收費<input name="price" type="number" step="0.01" value="0" /></label>
            <label>成本<input name="cost" type="number" step="0.01" value="0" /></label>
          </div>
          <label style="margin-top:10px">備註<textarea name="notes" rows="2"></textarea></label>
          <div style="margin-top:10px" class="actions">
            <button type="submit">新增資料</button>
          </div>
        </form>
      </section>

      <section class="card">
        <h2 style="margin-top:0">資料列表（<span id="count">0</span> 筆）</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>姓名</th><th>電話</th><th>品牌</th><th>型號</th><th>維修項目</th><th>IMEI</th><th>狀態</th><th>日期</th><th>收費</th><th>成本</th><th>備註</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script>
      const STORAGE_KEY = "repair_records_v1";
      const state = {
        rows: JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"),
        filtered: []
      };

      const els = {
        search: document.getElementById("search"),
        fromDate: document.getElementById("fromDate"),
        toDate: document.getElementById("toDate"),
        btnExport: document.getElementById("btnExport"),
        btnClear: document.getElementById("btnClear"),
        importFile: document.getElementById("importFile"),
        status: document.getElementById("status"),
        formAdd: document.getElementById("formAdd"),
        tbody: document.getElementById("tbody"),
        count: document.getElementById("count")
      };

      const headerAlias = {
        customer_name: ["customer_name", "姓名", "客戶姓名"],
        phone: ["phone", "電話", "手機"],
        brand: ["brand", "品牌"],
        model: ["model", "型號"],
        repair_item: ["repair_item", "維修項目", "項目"],
        imei: ["imei", "IMEI"],
        status: ["status", "狀態"],
        repair_date: ["repair_date", "日期", "維修日期"],
        price: ["price", "收費", "價格"],
        cost: ["cost", "成本"],
        notes: ["notes", "備註"]
      };

      const requiredFields = ["customer_name", "phone", "repair_item", "repair_date"];

      const setStatus = (msg, isError = false) => {
        els.status.textContent = msg;
        els.status.style.color = isError ? "#b91c1c" : "#065f46";
      };

      const persist = () => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state.rows));
      };

      const mapRow = (row) => {
        const out = {};
        for (const key of Object.keys(headerAlias)) {
          const aliases = headerAlias[key];
          const hit = aliases.find((name) => row[name] !== undefined && row[name] !== null && row[name] !== "");
          out[key] = hit ? String(row[hit]).trim() : "";
        }

        out.price = Number(out.price || 0);
        out.cost = Number(out.cost || 0);
        return out;
      };

      const isValid = (row) => requiredFields.every((f) => String(row[f] || "").trim() !== "");

      const applyFilter = () => {
        const q = els.search.value.trim().toLowerCase();
        const from = els.fromDate.value;
        const to = els.toDate.value;

        state.filtered = state.rows.filter((r) => {
          if (from && r.repair_date < from) return false;
          if (to && r.repair_date > to) return false;
          if (!q) return true;
          const hay = `${r.customer_name} ${r.phone} ${r.brand} ${r.model} ${r.repair_item}`.toLowerCase();
          return hay.includes(q);
        });
      };

      const render = () => {
        applyFilter();
        els.count.textContent = state.filtered.length;
        els.tbody.innerHTML = state.filtered.map((r) => `
          <tr>
            <td>${escapeHtml(r.customer_name)}</td>
            <td>${escapeHtml(r.phone)}</td>
            <td>${escapeHtml(r.brand)}</td>
            <td>${escapeHtml(r.model)}</td>
            <td>${escapeHtml(r.repair_item)}</td>
            <td>${escapeHtml(r.imei)}</td>
            <td>${escapeHtml(r.status)}</td>
            <td>${escapeHtml(r.repair_date)}</td>
            <td>${Number(r.price || 0)}</td>
            <td>${Number(r.cost || 0)}</td>
            <td>${escapeHtml(r.notes)}</td>
          </tr>
        `).join("");
      };

      function escapeHtml(s) {
        return String(s ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      els.formAdd.addEventListener("submit", (e) => {
        e.preventDefault();
        const data = new FormData(els.formAdd);
        const row = Object.fromEntries(data.entries());
        row.price = Number(row.price || 0);
        row.cost = Number(row.cost || 0);

        if (!isValid(row)) {
          setStatus("新增失敗：請至少填寫姓名、電話、維修項目、維修日期。", true);
          return;
        }

        state.rows.unshift(row);
        persist();
        els.formAdd.reset();
        render();
        setStatus("已新增 1 筆資料。", false);
      });

      [els.search, els.fromDate, els.toDate].forEach((el) => {
        el.addEventListener("input", render);
      });

      els.btnClear.addEventListener("click", () => {
        els.search.value = "";
        els.fromDate.value = "";
        els.toDate.value = "";
        render();
        setStatus("已清除篩選。", false);
      });

      els.btnExport.addEventListener("click", () => {
        applyFilter();
        if (!state.filtered.length) {
          setStatus("沒有可匯出的資料。", true);
          return;
        }

        const ws = XLSX.utils.json_to_sheet(state.filtered);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Repairs");
        XLSX.writeFile(wb, `repairs-${new Date().toISOString().slice(0, 10)}.xlsx`);
        setStatus(`已匯出 ${state.filtered.length} 筆資料。`, false);
      });

      els.importFile.addEventListener("change", async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;

        try {
          const buffer = await file.arrayBuffer();
          const wb = XLSX.read(buffer, { type: "array" });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const rawRows = XLSX.utils.sheet_to_json(ws, { defval: "" });
          const mapped = rawRows.map(mapRow).filter(isValid);

          if (!mapped.length) {
            setStatus("匯入失敗：沒有符合格式的資料。", true);
            return;
          }

          state.rows = [...mapped, ...state.rows];
          persist();
          render();
          setStatus(`匯入成功：${mapped.length} 筆。`, false);
        } catch (err) {
          console.error(err);
          setStatus("匯入失敗：請確認 Excel 檔案格式。", true);
        } finally {
          els.importFile.value = "";
        }
      });

      render();
      setStatus("系統已就緒，可直接新增、匯入、匯出。", false);
    </script>
  </body>
</html>
