<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phone Repair Customer Record</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fb;
      --card: #fff;
      --text: #1f2937;
      --muted: #6b7280;
      --brand: #2563eb;
      --brand-dark: #1e40af;
      --border: #e5e7eb;
      --ok: #16a34a;
      --warn: #d97706;
      --danger: #dc2626;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .container {
      width: min(980px, 94vw);
      margin: 24px auto;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 1.6rem;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      margin-bottom: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .grid-4 {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    label {
      display: block;
      font-size: .9rem;
      margin-bottom: 4px;
      color: #374151;
    }

    input, select, button {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: .95rem;
    }

    button {
      cursor: pointer;
      border: none;
      background: var(--brand);
      color: #fff;
      font-weight: 600;
      transition: background .15s ease;
    }

    button:hover { background: var(--brand-dark); }

    .row {
      display: flex;
      align-items: end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .row > * { flex: 1; }
    .fit { flex: 0 0 auto; width: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.92rem;
    }

    th, td {
      text-align: left;
      border-bottom: 1px solid var(--border);
      padding: 10px 8px;
      vertical-align: top;
    }

    th { font-size: 0.82rem; color: var(--muted); }

    .status {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: .78rem;
      font-weight: 700;
    }

    .pending { background: #fef3c7; color: #92400e; }
    .done { background: #dcfce7; color: #166534; }
    .picked { background: #dbeafe; color: #1d4ed8; }

    .danger { background: var(--danger); }
    .danger:hover { background: #991b1b; }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 10px;
    }

    .stat {
      background: #f9fafb;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
    }

    .stat small { color: var(--muted); }
    .stat strong { display: block; margin-top: 4px; font-size: 1.15rem; }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 22px 8px;
    }

    @media (max-width: 760px) {
      .grid, .grid-4, .stats { grid-template-columns: 1fr; }
      table { display: block; overflow: auto; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>手機維修客戶紀錄</h1>
    <div class="subtitle">本頁為可直接開啟使用的單檔版（資料儲存在瀏覽器 localStorage）。</div>

    <section class="card">
      <h3>新增維修單</h3>
      <div class="grid-4">
        <div>
          <label for="customer">客戶名稱</label>
          <input id="customer" placeholder="王小明" />
        </div>
        <div>
          <label for="phone">電話</label>
          <input id="phone" placeholder="09xxxxxxxx" />
        </div>
        <div>
          <label for="brand">品牌</label>
          <select id="brand">
            <option>Apple</option>
            <option>Samsung</option>
            <option>OPPO</option>
            <option>Vivo</option>
            <option>ASUS</option>
            <option>Sony</option>
            <option>Other</option>
          </select>
        </div>
        <div>
          <label for="model">型號</label>
          <input id="model" placeholder="iPhone 13" />
        </div>
        <div>
          <label for="repairItem">維修項目</label>
          <input id="repairItem" placeholder="換電池" />
        </div>
        <div>
          <label for="repairDate">維修日期</label>
          <input id="repairDate" type="date" />
        </div>
        <div>
          <label for="status">狀態</label>
          <select id="status">
            <option value="pending">待維修</option>
            <option value="done">已完成</option>
            <option value="picked">已取件</option>
          </select>
        </div>
        <div>
          <label for="price">售價</label>
          <input id="price" type="number" min="0" step="1" placeholder="0" />
        </div>
        <div>
          <label for="cost">成本</label>
          <input id="cost" type="number" min="0" step="1" placeholder="0" />
        </div>
      </div>
      <div style="margin-top: 12px;">
        <button id="addBtn">新增紀錄</button>
      </div>
   </section>

    <section class="card">
      <h3>搜尋與篩選</h3>
      <div class="row">
        <div>
          <label for="search">關鍵字</label>
          <input id="search" placeholder="搜尋姓名、電話、維修項目、型號" />

            <div className="text-right">
              <div>{formatCurrency(Number(r.price))}</div>
              <div>{formatCurrency(profit)}</div>
            </div>
          </div>
        </div>
       <div>
          <label for="filterStatus">狀態</label>
          <select id="filterStatus">
            <option value="all">全部</option>
            <option value="pending">待維修</option>
            <option value="done">已完成</option>
            <option value="picked">已取件</option>
          </select>
        </div>
        <button id="clearFilter" class="fit">清除篩選</button>
      </div>
<div class="stats">
        <div class="stat"><small>筆數</small><strong id="countStat">0</strong></div>
        <div class="stat"><small>總營收</small><strong id="revenueStat">$0</strong></div>
        <div class="stat"><small>總利潤</small><strong id="profitStat">$0</strong></div>
      </div>
    </section>

    <section class="card">
      <h3>維修清單</h3>
      <table>
        <thead>
          <tr>
            <th>客戶</th>
            <th>品牌/型號</th>
            <th>維修項目</th>
            <th>日期</th>
            <th>狀態</th>
            <th>價格 / 成本 / 利潤</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div id="empty" class="empty" hidden>目前沒有符合條件的資料。</div>
    </section>
  </div>

  <script>
    const KEY = "phone_repair_records_v1";
    const $ = (id) => document.getElementById(id);

    const state = {
      rows: JSON.parse(localStorage.getItem(KEY) || "[]")
    };

    const fmt = (n) => `$${Number(n || 0).toLocaleString("zh-TW")}`;
    const statusMap = {
      pending: "待維修",
      done: "已完成",
      picked: "已取件"
    };

    function save() {
      localStorage.setItem(KEY, JSON.stringify(state.rows));
    }

    function getFilteredRows() {
      const q = $("search").value.trim().toLowerCase();
      const filterStatus = $("filterStatus").value;

      return state.rows.filter((r) => {
        if (filterStatus !== "all" && r.status !== filterStatus) return false;
        if (!q) return true;
        const bag = `${r.customer} ${r.phone} ${r.model} ${r.repairItem}`.toLowerCase();
        return bag.includes(q);
      });
    }

    function render() {
      const rows = getFilteredRows();
      const tbody = $("tbody");
      tbody.innerHTML = "";

      let revenue = 0;
      let profit = 0;

      rows.forEach((r) => {
        revenue += Number(r.price || 0);
        profit += Number(r.price || 0) - Number(r.cost || 0);

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td><strong>${escapeHtml(r.customer)}</strong><br><small>${escapeHtml(r.phone)}</small></td>
          <td>${escapeHtml(r.brand)}<br><small>${escapeHtml(r.model || "-")}</small></td>
          <td>${escapeHtml(r.repairItem)}</td>
          <td>${escapeHtml(r.repairDate || "-")}</td>
          <td><span class="status ${r.status}">${statusMap[r.status] || "-"}</span></td>
          <td>${fmt(r.price)} / ${fmt(r.cost)} / <strong>${fmt(Number(r.price) - Number(r.cost))}</strong></td>
          <td><button class="danger" data-id="${r.id}">刪除</button></td>
        `;
        tbody.appendChild(tr);
      });

      $("countStat").textContent = String(rows.length);
      $("revenueStat").textContent = fmt(revenue);
      $("profitStat").textContent = fmt(profit);
      $("empty").hidden = rows.length > 0;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function addRecord() {
      const record = {
        id: crypto.randomUUID(),
        customer: $("customer").value.trim(),
        phone: $("phone").value.trim(),
        brand: $("brand").value,
        model: $("model").value.trim(),
        repairItem: $("repairItem").value.trim(),
        repairDate: $("repairDate").value,
        status: $("status").value,
        price: Number($("price").value || 0),
        cost: Number($("cost").value || 0)
      };

      if (!record.customer || !record.phone || !record.repairItem) {
        alert("請至少填寫：客戶名稱、電話、維修項目");
        return;
      }

      state.rows.unshift(record);
      save();
      ["customer", "phone", "model", "repairItem", "price", "cost"].forEach((id) => ($(id).value = ""));
      render();
    }

    function removeRecord(id) {
      if (!confirm("確定要刪除這筆資料嗎？")) return;
      state.rows = state.rows.filter((r) => r.id !== id);
      save();
      render();
    }

    $("addBtn").addEventListener("click", addRecord);
    $("search").addEventListener("input", render);
    $("filterStatus").addEventListener("change", render);
    $("clearFilter").addEventListener("click", () => {
      $("search").value = "";
      $("filterStatus").value = "all";
      render();
    });

    $("tbody").addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-id]");
      if (!btn) return;
      removeRecord(btn.dataset.id);
    });

    render();
  </script>
</body>
</html>
